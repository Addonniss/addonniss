name: Publish Translatarr Remote Extractor Image

on:
  push:
    branches: [ master, main ]
    paths:
      - "translatarr-remote-extractor/**"
      - ".github/workflows/translatarr_remote_extractor_image.yml"
  workflow_dispatch:

concurrency:
  group: translatarr-remote-extractor-image
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/translatarr-remote-extractor
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./translatarr-remote-extractor
          file: ./translatarr-remote-extractor/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
