name: Update Kodi Repository

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

concurrency:
  group: kodi-repo-update
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push files back

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 3️⃣ Debug: list files (optional)
      - name: List repo files for debug
        run: |
          echo "Current folder: $(pwd)"
          echo "Root files:"
          ls -la
          echo "Contents of service.translatarr:"
          ls -la service.translatarr || echo "Missing"

      # 4️⃣ Run repository generation
      - name: Generate Kodi Repo Files
        run: python create_repository.py

      # 5️⃣ Commit and push changes safely
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Track all changes including new zips
          git add -A

          # Commit only if there are changes
          git diff --cached --quiet || git commit -m "Auto-update repository v1.0.1 [skip ci]"

          # Pull remote first to avoid non-fast-forward errors
          git pull --rebase origin main || true

          # Push changes
          git push origin main
