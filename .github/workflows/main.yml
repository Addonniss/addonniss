name: Build and Deploy Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - uses: actions/checkout@v4

      # Force rebuild
      - name: Force rebuild
        run: echo "FORCE=$(date +%s)" > force.txt

      # Clean previous zips
      - name: Clean previous zips
        run: rm -rf zips/*

      # Build repository
      - name: Build repository
        run: python3 create_repository.py

      # Upload to GitHub Pages artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: zips

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
