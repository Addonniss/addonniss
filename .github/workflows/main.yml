name: Build and Deploy Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Clean previous zips
        run: |
          rm -rf zips
          mkdir -p zips

      - name: Build Kodi repository zips
        run: python3 create_repository.py

      - name: Upload zips artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: zips

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
