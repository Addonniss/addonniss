name: Build and Deploy Kodi Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Clean previous zips
        run: |
          rm -rf zips
          mkdir -p zips

      - name: Build Kodi repository
        run: python3 create_repository.py

      - name: Ensure .nojekyll
        run: touch zips/.nojekyll

      - name: Commit zips to main
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add zips
          git commit -m "Update repository zips [skip ci]" || echo "No changes to commit"
          

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: zips

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
