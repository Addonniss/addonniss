name: Build and Deploy Kodi Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write   # Allows committing generated zips back to repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # 3. Clean old zips folder
      - name: Clean previous zips
        run: rm -rf zips/*

      # 4. Build repository and service zips
      - name: Build repository
        run: python3 create_repository.py

      # 5. Commit zips back to main branch if changes exist
      - name: Commit updated zips
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add zips/
          git add addon.xml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update repository zips [skip ci]"
            git push origin main
